name: Auto Generate Blog

on:
  schedule:
    - cron: '0 0 */3 * *' # Her 3 günde bir çalışır
  workflow_dispatch: # Manuel olarak da tetiklenebilir

jobs:
  generate-blog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-js-version: '18'

      - name: Generate Blog Post
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/generate-blog.js

      - name: Commit and Push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add src/data/blog-posts.json
          git commit -m '🤖 Auto-generated new blog post' || echo "No changes to commit"
          git push
